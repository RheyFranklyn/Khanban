<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    
    <title>Task Board</title>
</head>
<body>
    <main class="board-container">
        <h1 class="board-title">Task board</h1>

        <div class="search-bar">
            <input class="search-input" id="searchInput" type="text" placeholder="Search tasks...">
        </div>

        <div class="board" id="board">

            <section class="column todo-section" data-status="todo">
                <header class="column-header">
                    <h2 class="column-title"><span class="dot todo"></span>To do</h2>
                    <span class="count">3</span>
                </header>
                <div class="card-list" data-status="todo"></div>
            </section>

            <section class="column in-progress-section" data-status="in-progress">
                <header class="column-header">
                    <h2 class="column-title"><span class="dot in-progress"></span>In progress</h2>
                    <span class="count">2</span>
                </header>
                <div class="card-list" data-status="in-progress"></div>
            </section>

            <section class="column review-section" data-status="review">
                <header class="column-header">
                    <h2 class="column-title"><span class="dot review"></span>Review</h2>
                    <span class="count">1</span>
                </header>
                <div class="card-list" data-status="review"></div>
            </section>

            <section class="column done-section" data-status="done">
                <header class="column-header">
                    <h2 class="column-title"><span class="dot done"></span>Done</h2>
                    <span class="count">2</span>
                </header>
                <div class="card-list" data-status="done"></div>
            </section>

        </div>

        <button class="add-task-btn" id="addTaskBtn" type="button">
            <span class="add-task-icon">+</span>
            Add task
        </button>

        <div class="modal-overlay" id="modalOverlay">
            <form class="modal" id="addTaskForm">
                <h2 class="modal-title" id="modalTitle">New task</h2>
                <input type="hidden" id="editingTaskId" value="">

                <label class="field-label" for="taskTitle">Title</label>
                <input class="field-input" id="taskTitle" name="title" type="text" placeholder="e.g. Fix login redirect bug" required>

                <label class="field-label" for="taskDescription">Description</label>
                <textarea class="field-input" id="taskDescription" name="description" rows="3" placeholder="Optional details"></textarea>

                <label class="field-label" for="taskTag">Tag</label>
                <select class="field-input" id="taskTag" name="tag">
                    <option value="urgent">Urgent</option>
                    <option value="priority">Priority</option>
                    <option value="planning">Planning</option>
                    <option value="marketing">Marketing</option>
                </select>

                <label class="field-label" for="taskInitials">Assignee initials</label>
                <input class="field-input" id="taskInitials" name="initials" type="text" maxlength="2" placeholder="e.g. AK">

                <div class="modal-actions">
                    <button class="btn-secondary" id="cancelAddTask" type="button">Cancel</button>
                    <button class="btn-primary" id="submitTaskBtn" type="submit">Add task</button>
                </div>
            </form>
        </div>

    </main>  

    <script src="dist/app.js" type="module"></script>
</body>
</html>
